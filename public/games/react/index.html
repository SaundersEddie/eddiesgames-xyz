<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden; /* critical: no internal scrolling */
  }

  #wrap {
    position: relative;
    width: 100%;
    height: 100%;
  }

  #game {
    display: block;   /* removes the tiny baseline gap */
    width: 100%;
    height: 100%;
  }

  #hud {
    position: absolute;
    left: 16px;
    bottom: 16px;
    z-index: 10;
    font: 500 14px system-ui, -apple-system, Segoe UI, Roboto, Arial;
    color: rgba(255,255,255,0.85);
    line-height: 1.25;
    user-select: none;
    pointer-events: none; /* clicks go to canvas */
  }

  #restart {
    position: absolute;
    right: 16px;
    bottom: 16px;
    z-index: 11;
    pointer-events: auto;
  }
</style>

<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="score"></div>
    <div id="combo"></div>
    <div id="lives"></div>
    <div id="hint">Tap / Click / Space</div>
  </div>

  <button id="restart" style="display:none;">Restart</button>
</div>

<script type="module" src="./main.js"></script>
